<li><p>顶点着色器方法</p>
<figure class="highlight cs"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br></pre></td><td class="code"><pre><code class="hljs cs"><span class="hljs-comment">//float4 v: POSITION 把顶点坐标传递给v,冒号后面的是shader语义指的顶点坐标</span><br><span class="hljs-comment">//每一个顶点坐标都会调用这个方法</span><br><span class="hljs-function">float4 <span class="hljs-title">ver</span>(<span class="hljs-params">float4 v: POSITION</span>) : SV_POSITION</span><br>&#123;<br>    <span class="hljs-comment">//: SV_POSITION 这个语义指返回值是剪裁空间下的坐标</span><br>    <span class="hljs-comment">//UNITY_MATRIX_MVP 是一个矩阵用以从世界坐标转换到剪裁空间下的坐标</span><br>    float4 pos = mul(UNITY_MATRIX_MVP,v);<br>    <span class="hljs-keyword">return</span>  pos;<br>&#125;<br></code></pre></td></tr></table></figure></li>
</ul>
<p>例子: 这里定义了一个顶点呈振动波的shader</p>
<p class='item-img' data-src='/2002/01/01/images/Snipaste_2023-04-17_14-36-01.jpg'><img src="/2002/01/01/images/Snipaste_2023-04-17_14-36-01.jpg" alt="Snipaste_2023-04-17_14-36-01"></p>
<figure class="highlight cs"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br></pre></td><td class="code"><pre><code class="hljs cs"><span class="hljs-function">v2f <span class="hljs-title">vert</span> (<span class="hljs-params">appdata v</span>)</span><br>  &#123;<br>    v2f o;<br>    <span class="hljs-comment">//顶点偏移</span><br>    <span class="hljs-comment">//这里是一个波动方程</span><br>    v.vertex.y += _Range * sin(_Time.y + v.vertex.x);<span class="hljs-comment">//_Time.x == t/20 |  _Time.y == t |  _Time.z == t * 2  |  _Time.w == t * 3 ,t是场景加载的时间</span><br>    o.vertex = UnityObjectToClipPos(v.vertex);<br>    o.uv = v.uv;<br>    <span class="hljs-keyword">return</span> o;<br>  &#125;<br></code></pre></td></tr></table></figure>
