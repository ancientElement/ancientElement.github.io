pan> <span class="hljs-keyword">virtual</span> <span class="hljs-keyword">void</span> <span class="hljs-title">onValueChanged</span>(<span class="hljs-params"><span class="hljs-built_in">string</span> toggleName, <span class="hljs-built_in">bool</span> <span class="hljs-keyword">value</span></span>)</span><br>    &#123;<br><br>    &#125;<br><br>    <span class="hljs-comment"><span class="hljs-doctag">///</span> <span class="hljs-doctag">&lt;summary&gt;</span></span><br>    <span class="hljs-comment"><span class="hljs-doctag">///</span> 寻找控件通过游戏对象名储存游戏对象身上的一系列控件</span><br>    <span class="hljs-comment"><span class="hljs-doctag">///</span> 并添加事件监听</span><br>    <span class="hljs-comment"><span class="hljs-doctag">///</span> <span class="hljs-doctag">&lt;/summary&gt;</span></span><br>    <span class="hljs-comment"><span class="hljs-doctag">///</span> <span class="hljs-doctag">&lt;typeparam name=&quot;T&quot;&gt;</span><span class="hljs-doctag">&lt;/typeparam&gt;</span></span><br>    <span class="hljs-function"><span class="hljs-keyword">private</span> <span class="hljs-keyword">void</span> <span class="hljs-title">FindControl</span>&lt;<span class="hljs-title">T</span>&gt;() <span class="hljs-keyword">where</span> T : UIBehaviour</span><br>    &#123;<br>        T[] controls = GetComponentsInChildren&lt;T&gt;();<br>        <span class="hljs-comment">//寻找button组件并通过游戏对象名字储存</span><br>        <span class="hljs-keyword">for</span> (<span class="hljs-built_in">int</span> i = <span class="hljs-number">0</span>; i &lt; controls.Length; i++)<br>        &#123;<br>            <span class="hljs-built_in">string</span> objName = controls[i].gameObject.name;<br>            <span class="hljs-comment">//有游戏名的控件组</span><br>            <span class="hljs-comment">//加入这个控件</span><br>            <span class="hljs-keyword">if</span> (controlDic.ContainsKey(objName))<br>                controlDic[objName].Add(controls[i]);<br>            <span class="hljs-comment">//没有创建游戏名的控件组</span><br>
