an><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br><span class="line">84</span><br><span class="line">85</span><br><span class="line">86</span><br><span class="line">87</span><br><span class="line">88</span><br><span class="line">89</span><br><span class="line">90</span><br><span class="line">91</span><br><span class="line">92</span><br><span class="line">93</span><br><span class="line">94</span><br><span class="line">95</span><br><span class="line">96</span><br><span class="line">97</span><br><span class="line">98</span><br><span class="line">99</span><br><span class="line">100</span><br><span class="line">101</span><br><span class="line">102</span><br><span class="line">103</span><br><span class="line">104</span><br><span class="line">105</span><br><span class="line">106</span><br><span class="line">107</span><br><span class="line">108</span><br><span class="line">109</span><br><span class="line">110</span><br></pre></td><td class="code"><pre><code class="hljs cs"><span class="hljs-keyword">public</span> <span class="hljs-keyword">class</span> <span class="hljs-title">PoolData</span><br>&#123;<br>    GameObject fatherObj;<span class="hljs-comment">//场景上的父节点</span><br>    <span class="hljs-keyword">public</span> List&lt;GameObject&gt; Datalist;<span class="hljs-comment">//抽屉</span><br><br>    <span class="hljs-comment">//当外部需要创建这个抽屉时</span><br>    <span class="hljs-comment">//初始化抽屉</span><br>    <span class="hljs-comment">//创建场景上的父节点(与物体同名) 挂载到场景上的pool</span><br>    <span class="hljs-comment">//并放入第一个物体</span><br>    <span class="hljs-function"><span class="hljs-keyword">public</span> <span class="hljs-title">PoolData</span>(<span class="hljs-params">GameObject poolObj, GameObject obj</span>)</span><br>    &#123;<br>        Datalist = <span class="hljs-keyword">new</span> List&lt;GameObject&gt;();<br>        fatherObj = <span class="hljs-keyword">new</span> GameObject(obj.name);<br>        fatherObj.transform.parent = poolObj.transform;<br>        PushObj(obj);<br>    &#125;<br><br>    <span class="hljs-comment">//拿到第一个抽屉里的物体</span><br>    <span class="hljs-comment">//将物体 取消与场景上的父节点 的关联</span><br>    <span class="hljs-comment">//激活物体</span><br>    <span class="hljs-comment">//从抽屉里取出</span><br>    <span class="hljs-function"><span class="hljs-keyword">public</span> GameObject <span class="hljs-title">GetObj</span>()</span><br>    &#123;<br>        GameObject obj = Datalist[<span class="hljs-number">0</span>];<br>        obj.transform.parent = <span class="hljs-literal">null</span>;<br>        obj.SetActive(<span class="hljs-literal">true</span>);<br>        Datalist.RemoveAt(<span class="hljs-number">0</span>);<br>        <span class="hljs-keyword">return</span> obj;<br>    &#125;<br><br>    <span class="hljs-comment">//将物体失活</span><br>    <span class="hljs-comment">//设置父级为fatherObj</span><br>    <span class="hljs-comment">//放进抽屉里</span><br>    <span class="hljs-function"><span class="hljs-keyword">public</span> <span class="hljs-keyword">void</span> <span class="hljs-title">PushObj</span>(<span class="hljs-params">GameObject obj</span>)</span><br>    &#123;<br>        obj.SetActive(<span class="hljs-literal">false</span>);<br>        obj.transform.parent = fatherObj.transform;<br>        Datalist.Add(obj);<br>    &#125;<br>&#125;<br><br><br><span class="hljs-comment"><span class="hljs-doctag">///</span> <span class="hljs-doctag">&lt;summary&gt;</span></span><br><span class="hljs-comment"><span class="hljs-doctag">///</span> 缓存池</span><br><span class="hljs-comment"><span class="hljs-doctag">///</span> <span class="hljs-doctag">&lt;/summary&gt;</span></span><br><span class="hljs-keyword">public</span> <span class="hljs-keyword">class</span> <span class="hljs-title">PoolManager</span> : <span class="hljs-title">BaseManager</span>&lt;<span class="hljs-title">PoolManager</span>&gt;<br>&#123;<br>    <span class="hljs-keyword">public</span> GameObject poolObj;<span class="hljs-comment">//场景上代表物体的空节点</span><br><br>    <span class="hljs-comment">//定义一个缓存池</span><br>    <span class="hljs-comment">//用Dictionary 和 list</span><br>    <span class="hljs-keyword">public</span> Dictionary&lt;<span class="hljs-built_in">string</span>, PoolData&gt; poolDic = <span class="hljs-keyword">new</span> Dictionary&lt;<span class="hljs-built_in">string</span>, PoolData&gt;();<br><br>    <span class="hljs-comment">//从池里拿东西 通过 抽屉名字</span><br>    <span class="hljs-function"><span class="hljs-keyword">public</span> GameObject <span class="hljs-title">GetObj</span>(<span class="hljs-params"><span class="hljs-built_in">string</span> name</span>)</span><br>    &#123;<br>        GameObject obj = <span class="hljs-literal">null</span>;<br>        <span class="hljs-comment">//有这个抽屉 且抽屉里的东西大于0</span><br>        <span class="hljs-comment">//将抽屉里第一个物品给出去 并 移出pool</span><br>        <span class="hljs-keyword">if</span> (poolDic.ContainsKey(name) &amp;&amp; poolDic[name].Datalist.Count &gt; <span class="hljs-number">0</span>)<br>        &#123;<br>            obj = poolDic[name].GetObj();<br>        &#125;<br>        <span class="hljs-comment">//没有就创建这个物体</span><br>        <span class="hljs-comment">//给出去 但是 不能保存到pool</span><br>        <span class="hljs-keyword">else</span><br>        &#123;<br>            obj = GameObject.Instantiate(Resources.Load&lt;GameObject&gt;(name));<br>        &#125;<br><br>        <span class="hljs-comment">//为obj的name赋值这样就可以之后通过name拿到obj</span><br>        <span class="hljs-comment">//给出去的物体激活</span><br>        obj.name = name;<br>        obj.SetActive(<span class="hljs-literal">true</span>);<br>        <span class="hljs-keyword">return</span> obj;<br>    &#125;<br><br>    <span class="hljs-comment">//将物品放到场景上的父节点里</span><br>    <span class="hljs-comment">//将物品放到池里</span><br>    <span class="hljs-function"><span class="hljs-keyword">public</span> <span class="hljs-keyword">void</span> <span class="hljs-title">PushObj</span>(<span class="hljs-params"><span class="hljs-built_in">string</span> name, GameObject obj</span>)</span><br>    &#123;<br>        <span class="hljs-keyword">if</span> (poolObj == <span class="hljs-literal">null</span>)<br>            poolObj = <span class="hljs-keyword">new</span> GameObject(<span class="hljs-string">&quot;Pool&quot;</span>);<br><br>        <span class="hljs-comment">//使这个物品失活</span><br>        obj.SetActive(<span class="hljs-literal">false</span>);<br><br>        <span class="hljs-comment">//存放物品</span><br>        <span class="hljs-comment">//有这个存放物品的抽屉</span><br>        <span class="hljs-keyword">if</span> (poolDic.ContainsKey(name))<br>        &#123;<br>            poolDic[name].PushObj(obj);<br>        &#125;<br>        <span class="hljs-comment">//没有这个抽屉</span><br>        <span class="hljs-comment">//创建这个抽屉并存放物品</span><br>        <span class="hljs-keyword">else</span><br>        &#123;<br>            poolDic.Add(name, <span class="hljs-keyword">new</span> PoolData(poolObj, obj));<br>        &#125;<br><br>    &#125;<br><br>    <span class="hljs-comment">//场景转换时清理缓存池</span><br>    <span class="hljs-function"><span class="hljs-keyword">public</span> <span class="hljs-keyword">void</span> <span class="hljs-title">Clear</span>()</span><br>    &#123;<br>        poolDic.Clear();<br>        poolObj = <span class="hljs-literal">null</span>;<br>    &#125;<br><br>&#125;<br></code></pre></
